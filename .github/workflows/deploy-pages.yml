name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install markdown converter
        run: npm install -g markdown-it markdown-it-highlightjs
      
      - name: Build site
        run: |
          mkdir -p _site
          
          # Create markdown conversion script
          cat > convert-md.js << 'CONVERTJS'
          const fs = require('fs');
          const path = require('path');
          const md = require('markdown-it')({
            html: false,  // Don't parse HTML tags in markdown
            breaks: true,
            linkify: true
          });
          
          const inputFile = process.argv[2];
          const outputFile = process.argv[3];
          const title = path.basename(inputFile, '.md');
          
          const markdown = fs.readFileSync(inputFile, 'utf8');
          const htmlContent = md.render(markdown);
          
          const fullHtml = `<!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${title}</title>
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css">
              <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
              <style>
                  .markdown-body {
                      box-sizing: border-box;
                      min-width: 200px;
                      max-width: 980px;
                      margin: 0 auto;
                      padding: 45px;
                  }
                  @media (max-width: 767px) {
                      .markdown-body {
                          padding: 15px;
                      }
                  }
                  .markdown-body pre {
                      background-color: #0d1117;
                      border: 1px solid #30363d;
                      border-radius: 6px;
                  }
                  .markdown-body code {
                      font-family: 'Courier New', Courier, monospace;
                  }
              </style>
          </head>
          <body>
              <article class="markdown-body">
          ${htmlContent}
              </article>
              <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
              <script type="module">
                  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
                  
                  mermaid.initialize({ 
                      startOnLoad: false, 
                      theme: 'dark',
                      securityLevel: 'loose'
                  });
                  
                  document.querySelectorAll('pre code.language-mermaid').forEach((block) => {
                      const pre = block.parentElement;
                      const mermaidDiv = document.createElement('div');
                      mermaidDiv.className = 'mermaid';
                      let text = block.textContent || block.innerText;
                      mermaidDiv.textContent = text;
                      pre.replaceWith(mermaidDiv);
                  });
                  
                  try {
                      await mermaid.run({
                          querySelector: '.mermaid',
                      });
                  } catch (e) {
                      console.error('Mermaid rendering error:', e);
                      document.querySelectorAll('.mermaid').forEach(div => {
                          if (!div.hasAttribute('data-processed')) {
                              div.style.color = 'red';
                              div.style.whiteSpace = 'pre-wrap';
                              div.textContent = 'Mermaid error: ' + e.message;
                          }
                      });
                  }
                  
                  document.querySelectorAll('pre code:not(.language-mermaid)').forEach((block) => {
                      hljs.highlightElement(block);
                  });
              </script>
          </body>
          </html>`;
          
          fs.writeFileSync(outputFile, fullHtml, 'utf8');
          CONVERTJS
          
          # Convert markdown files to HTML
          for file in *.md; do
            if [ -f "$file" ]; then
              filename="${file%.md}"
              node convert-md.js "$file" "_site/${filename}.html"
            fi
          done
          
          # Copy ejemplos-hypertexto folder
          cp -r ejemplos-hypertexto _site/
          
          # Convert README.md files in examples to README.html
          find _site/ejemplos-hypertexto -type f -name "README.md" | while read readme; do
            dir=$(dirname "$readme")
            node convert-md.js "$readme" "$dir/README.html"
          done
          
          # Create index.html with links to all pages
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Curso Frontend React</title>
              <style>
                  body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
                  h1 { color: #333; }
                  ul { list-style-type: none; padding: 0; }
                  li { margin: 10px 0; }
                  a { color: #0066cc; text-decoration: none; font-size: 18px; }
                  a:hover { text-decoration: underline; }
                  .section { margin: 30px 0; }
              </style>
          </head>
          <body>
              <h1>Curso Frontend React</h1>
              <div class="section">
                  <h2>Apuntes</h2>
                  <ul>
                      <li><a href="WWW.html">WWW</a></li>
                      <li><a href="Hypertexto.html">Hypertexto</a></li>
                      <li><a href="React.html">React</a></li>
                  </ul>
              </div>
              <div class="section">
                  <h2>Ejemplos</h2>
                  <ul>
                      <li><a href="ejemplos-hypertexto/">Ejemplos Hypertexto</a></li>
                  </ul>
              </div>
          </body>
          </html>
          EOF
        shell: bash
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
