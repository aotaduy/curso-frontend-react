name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install markdown converter
        run: npm install -g markdown-it-cli
      
      - name: Build site
        run: |
          mkdir -p _site
          
          # Convert markdown files to HTML
          for file in *.md; do
            if [ -f "$file" ]; then
              filename="${file%.md}"
              markdown-it "$file" > "_site/${filename}.html"
            fi
          done
          
          # Copy ejemplos-hypertexto folder
          cp -r ejemplos-hypertexto _site/
          
          # Convert README.md files in examples to README.html
          find _site/ejemplos-hypertexto -type f -name "README.md" | while read readme; do
            dir=$(dirname "$readme")
            markdown-it "$readme" > "$dir/README.html"
          done
          
          # Create index.html with links to all pages
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Curso Frontend React</title>
              <style>
                  body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
                  h1 { color: #333; }
                  ul { list-style-type: none; padding: 0; }
                  li { margin: 10px 0; }
                  a { color: #0066cc; text-decoration: none; font-size: 18px; }
                  a:hover { text-decoration: underline; }
                  .section { margin: 30px 0; }
              </style>
          </head>
          <body>
              <h1>Curso Frontend React</h1>
              <div class="section">
                  <h2>Apuntes</h2>
                  <ul>
                      <li><a href="WWW.html">WWW</a></li>
                      <li><a href="Hypertexto.html">Hypertexto</a></li>
                      <li><a href="React.html">React</a></li>
                  </ul>
              </div>
              <div class="section">
                  <h2>Ejemplos</h2>
                  <ul>
                      <li><a href="ejemplos-hypertexto/">Ejemplos Hypertexto</a></li>
                  </ul>
              </div>
          </body>
          </html>
          EOF
        shell: bash
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
